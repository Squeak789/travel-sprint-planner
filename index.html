<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>疾行旅策 SprintTrip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <header class="hero">
    <div class="hero-badge">特种兵式旅游规划器</div>
    <h1>疾行旅策<br /><span>SprintTrip</span></h1>
    <p>把 3 天当 6 天用。自动排出高密度、少绕路、可执行的旅行路线。</p>
  </header>

  <main class="layout">
    <section class="panel control-panel">
      <h2>行程参数</h2>
      <div class="form-grid">
        <label>
          城市
          <input id="cityInput" type="text" placeholder="如：杭州、长沙、京都" value="北京" />
        </label>

        <label>
          出发日期
          <input id="startDate" type="date" />
        </label>

        <label>
          旅行天数
          <input id="days" type="number" min="1" max="14" value="3" />
        </label>

        <label>
          每天出发时间
          <input id="startHour" type="time" value="07:00" />
        </label>

        <label>
          每天收工时间
          <input id="endHour" type="time" value="22:30" />
        </label>

        <label>
          强度模式
          <select id="intensity">
            <option value="balanced">平衡（推荐）</option>
            <option value="hardcore">硬核（景点更多）</option>
            <option value="extreme">极限（体力警告）</option>
          </select>
        </label>

        <label>
          起点位置
          <input id="originInput" type="text" value="市中心酒店" placeholder="如：人民广场地铁站" />
        </label>

        <label>
          地图服务
          <select id="mapProvider">
            <option value="amap">高德 API</option>
            <option value="baidu">百度 API</option>
          </select>
        </label>

        <label>
          地图 Key
          <input id="mapApiKey" type="password" placeholder="输入高德/百度 Web 服务 Key" />
        </label>

        <label>
          出行方式
          <select id="transportMode">
            <option value="transit">公共交通</option>
            <option value="driving">打车/驾车</option>
            <option value="walking">步行</option>
          </select>
        </label>
      </div>

      <div class="checkbox-area">
        <p>必须打卡（可多选）</p>
        <div id="mustContainer" class="must-list"></div>
      </div>

      <button id="planBtn" class="plan-btn">生成特种兵路线</button>

      <div class="ai-box">
        <p>AI 攻略优化（可选）</p>
        <label class="toggle-row">
          <input id="aiEnabled" type="checkbox" />
          启用 AI 热门攻略增强
        </label>
        <div class="form-grid ai-grid">
          <label>
            后端优化服务
            <input id="optimizerApi" type="text" value="http://localhost:3001" />
          </label>
          <label>
            AI 接口地址
            <input id="aiEndpoint" type="text" value="https://openrouter.ai/api/v1/chat/completions" />
          </label>
          <label>
            AI 模型
            <input id="aiModel" type="text" value="openai/gpt-4.1-mini" />
          </label>
          <label>
            AI Key
            <input id="aiApiKey" type="password" placeholder="输入兼容 OpenAI 的 API Key" />
          </label>
        </div>

          <button id="loadCityBtn" class="plan-btn secondary-btn" type="button">AI 获取热门景点</button>
      </div>
    </section>

    <section class="panel result-panel">
      <div class="result-head">
        <h2>路线结果</h2>
        <span id="summaryTag" class="summary-tag">等待生成</span>
      </div>
      <div id="routeResult" class="route-result">
        <p class="placeholder">点击左侧按钮，生成你的高强度行程。</p>
      </div>
      <div id="aiResult" class="ai-result"></div>
    </section>
  </main>

  <footer class="footer">
    <p>提示：算法会优先安排“必须打卡”，并尽量缩短移动时间。地图 Key 直接在浏览器调用时可能暴露，生产环境建议通过后端代理保护密钥。</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
